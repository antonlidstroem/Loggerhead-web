<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loggerhead</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="top-bar">
    <span>Loggerhead</span>
    <span id="status">Ready</span>
</header>

<div class="app">

    <aside class="sidebar">
        <input type="file" id="fileInput" hidden>

        <button onclick="fileInput.click()">Open</button>
        <button onclick="pasteFromClipboard()">Paste</button>
        <button onclick="washLog()">Wash</button>
        <button onclick="clearScreen()">Clear</button>

        <hr>

        <button onclick="copyClean()">Copy Clean</button>
        <button onclick="copyOriginal()">Copy Original</button>
        <button onclick="exportJSONFile()">Export JSON</button>

        <hr>

        <button onclick="toggleDiff()">Diff</button>
        <button onclick="restoreLast()">Restore</button>
    </aside>

    <main class="main">

        <div class="toolbar">
            <select id="profileSelect">
                <option value="default">Default</option>
                <option value="privacy">Privacy</option>
            </select>

            <input 
                type="text"
                placeholder="Search..."
                oninput="searchLog(this.value)"
            >
        </div>

        <div id="statsPanel"></div>

        <div id="log-area" contenteditable="true"></div>

    </main>

</div>

<!-- MOBILE BAR -->
<div class="mobile-bar">
    <button onclick="washLog()">Wash</button>
    <button onclick="copyClean()">Copy</button>
    <button onclick="toggleDiff()">Diff</button>
    <button onclick="toggleMenu()">More</button>
</div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
    <button onclick="fileInput.click()">Open</button>
    <button onclick="pasteFromClipboard()">Paste</button>
    <button onclick="clearScreen()">Clear</button>
    <button onclick="restoreLast()">Restore</button>
</div>

<script type="module" src="./js/app.js"></script>

</body>
</html>
