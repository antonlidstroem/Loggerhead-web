<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loggerhead</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="top-bar">
    <span>Loggerhead</span>
    <span id="status">Ready</span>
</header>

<div class="app">

    <aside class="sidebar">
        <input type="file" id="fileInput" hidden>

        <button id="btnOpen">Open</button>
        <button id="btnPaste">Paste</button>
        <button id="btnWash">Wash</button>
        <button id="btnClear">Clear</button>

        <hr>

        <button id="btnCopyClean">Copy Clean</button>
        <button id="btnCopyOriginal">Copy Original</button>
        <button id="btnExport">Export JSON</button>

        <hr>

        <button id="btnDiff">Diff</button>
        <button id="btnRestore">Restore</button>
    </aside>

    <main class="main">

        <div class="toolbar">
            <select id="profileSelect">
                <option value="default">Default</option>
                <option value="privacy">Privacy</option>
            </select>

            <input type="text"
                   placeholder="Search..."
                   id="searchInput">
        </div>

        <div id="statsPanel"></div>

        <!-- 🔥 CRITICAL FIX -->
        <div id="log-area" contenteditable="true"></div>

    </main>

</div>

<!-- MOBILE BAR -->
<div class="mobile-bar">
    <button id="mWash">Wash</button>
    <button id="mCopy">Copy</button>
    <button id="mDiff">Diff</button>
    <button id="mMenu">More</button>
</div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
    <button id="mOpen">Open</button>
    <button id="mPaste">Paste</button>
    <button id="mClear">Clear</button>
    <button id="mRestore">Restore</button>
</div>

<script type="module" src="./js/app.js"></script>

</body>
</html>
